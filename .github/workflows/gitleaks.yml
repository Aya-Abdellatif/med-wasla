name: Gitleaks Secret Scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --verbose
          token: ${{ github.token }}
