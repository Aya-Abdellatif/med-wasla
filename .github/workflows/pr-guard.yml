name: 🛡️ Pull Request Guard

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:

  pr-validation:
    name: 📋 PR Validation
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Check PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title || "";
            console.log("PR Title:", title);

            if (title.length < 1) {
              core.setFailed("❌ PR title is too short. Please describe what you changed (min 1 character).");
              return;
            }

            console.log("✅ PR title looks good!");

      - name: 📂 List changed files & post comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const fileList = files.map(f => `- \`${f.filename}\` _(${f.status})_`).join("\n");
            const author = context.payload.pull_request.user.login;
            const branch = context.payload.pull_request.head.ref;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🩺 MedWasla CI — PR Summary\n\n**Author:** @${author}\n**Branch:** \`${branch}\` → \`main\`\n\n### 📂 Files changed (${files.length})\n\n${fileList}\n\n---\n> 🤖 Auto-generated by MedWasla CI`
            });

  conflict-check:
    name: 🔀 Merge Conflict Check
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔀 Check for merge conflicts
        uses: actions/github-script@v7
        with:
          script: |
            await new Promise(r => setTimeout(r, 5000));

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            console.log("Mergeable state:", pr.mergeable_state);

            if (pr.mergeable_state === "dirty") {
              core.setFailed("❌ This PR has merge conflicts with main. Please resolve them before merging.");
            } else {
              console.log("✅ No merge conflicts!");
            }