name: 🛡️ Pull Request Guard

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:

  pr-validation:
    name: 📋 PR Validation
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Check PR title & description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const title = pr.title || "";

            console.log("PR Title:", title);
            console.log("PR Body length:", body.length);

            if (title.length < 5) {
              core.setFailed("❌ PR title is too short. Please describe what you changed (min 5 characters).");
              return;
            }

            if (body.trim().length === 0) {
              core.warning("⚠️ Your PR has no description. Please explain what you changed and why.");
            }

            console.log("✅ PR title and description look good!");

      - name: 📂 List changed files & post comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const fileList = files.map(f => `- \`${f.filename}\` _(${f.status})_`).join("\n");
            const author = context.payload.pull_request.user.login;
            const branch = context.payload.pull_request.head.ref;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🩺 MedWasla CI — PR Summary\n\n**Author:** @${author}\n**Branch:** \`${branch}\` → \`main\`\n\n### 📂 Files changed (${files.length})\n\n${fileList}\n\n---\n> 🤖 Auto-generated by MedWasla CI`
            });

  conflict-check:
    name: 🔀 Merge Conflict Check
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔀 Check for merge conflicts
        uses: actions/github-script@v7
        with:
          script: |
            // Wait a moment for GitHub to compute mergeability
            await new Promise(r => setTimeout(r, 5000));

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            console.log("Mergeable state:", pr.mergeable_state);

            if (pr.mergeable_state === "dirty") {
              core.setFailed("❌ This PR has merge conflicts with main. Please resolve them before merging.");
            } else {
              console.log("✅ No merge conflicts!");
            }

  branch-check:
    name: 🌿 Branch Name Check
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Validate branch belongs to a team member
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            console.log("Source branch:", branch);

            // ✅ Your 6 team member branches (exact names from GitHub)
            const teamBranches = [
              "Ranim-Mohareb",
              "aya",
              "hana",
              "mayar",
              "salma",
              "walaa",
            ];

            // Also allow branches that follow feature/fix naming
            const isTeamBranch = teamBranches.includes(branch)
              || branch.startsWith("feature/")
              || branch.startsWith("fix/")
              || branch.startsWith("hotfix/");

            if (!isTeamBranch) {
              core.warning(
                `⚠️ Branch "${branch}" is not a recognized team branch. ` +
                `Known branches: ${teamBranches.join(", ")}`
              );
            } else {
              console.log(`✅ Branch "${branch}" recognized as a valid team branch.`);
            }